# Example chaos server configuration.
# Copy to chaos.toml (or point CHAOS_CONFIG at it) and adjust.
# On NixOS this file is generated by the services.chaos module.

listen = "0.0.0.0:4600"
# static_dir = "/var/lib/chaos/www"
# icon_cache_dir = "icons"

# Dashboard search bar; {} is replaced by the url-encoded query.
search_url = "https://duckduckgo.com/?q={}"

[monitor]
interval_secs = 60
timeout_ms = 5000

[archive]
enabled = true
auto = true            # snapshot new links automatically
dir = "archives"
monolith_bin = "monolith"
timeout_secs = 120

[[services]]
id = "jellyfin"
title = "Jellyfin"
url = "http://zeus:8096"
icon = "di:jellyfin"

[[services]]
id = "immich"
title = "Immich"
url = "http://zeus:2283"
icon = "di:immich"

[[services]]
id = "grafana"
title = "Grafana"
url = "http://zeus:3000"
icon = "di:grafana"

[[bookmarks]]
title = "Main"

[[bookmarks.links]]
title = "ProtonMail"
url = "https://mail.proton.me"
icon = "si:protonmail"

[[bookmarks.links]]
title = "GitHub"
url = "https://github.com"
icon = "si:github"

[[bookmarks.links]]
title = "Reddit"
url = "https://reddit.com"
icon = "si:reddit"

# ---- layout (optional) ----
# Without [[columns]] the dashboard is a single column: search bar, services,
# bookmarks. With columns you place widgets explicitly; search/bookmarks
# widgets fall back to the top-level `search_url` / `[[bookmarks]]` above.
#
# Widget types: search, services, bookmarks, weather, feed, releases,
# server_stats. Data widgets are fetched and cached server-side.

[[columns]]
size = "full"

[[columns.widgets]]
type = "search"

[[columns.widgets]]
type = "services"

[[columns.widgets]]
type = "feed"
title = "Hacker News"
urls = ["https://hnrss.org/frontpage"]
limit = 10

[[columns.widgets]]
type = "bookmarks"

[[columns]]
size = "small"

[[columns.widgets]]
type = "weather"
location = "Paris"

[[columns.widgets]]
type = "releases"
repos = ["leptos-rs/leptos", "tauri-apps/tauri", "Y2Z/monolith"]
limit = 6

[[columns.widgets]]
type = "server_stats"
# mounts = ["/", "/data"]   # limit the disk list; empty shows every filesystem
