# Example chaos server configuration.
# Copy to chaos.toml (or point CHAOS_CONFIG at it) and adjust.
# On NixOS this file is generated by the services.chaos module.

listen = "0.0.0.0:4600"
# static_dir = "/var/lib/chaos/www"
# icon_cache_dir = "icons"

# Dashboard search bar; {} is replaced by the url-encoded query.
search_url = "https://duckduckgo.com/?q={}"

[monitor]
interval_secs = 60
timeout_ms = 5000

[archive]
enabled = true
auto = true            # snapshot new links automatically
dir = "archives"
monolith_bin = "monolith"
timeout_secs = 120

# Scheduled database backups: a consistent snapshot (VACUUM INTO) of the
# SQLite file every interval, pruned to the `keep` newest. Off by default.
# [backup]
# enabled = true
# dir = "backups"        # chaos-<timestamp>.db files land here
# interval_hours = 24
# keep = 14

[[services]]
id = "jellyfin"
title = "Jellyfin"
url = "http://zeus:8096"
icon = "di:jellyfin"

[[services]]
id = "immich"
title = "Immich"
url = "http://zeus:2283"
icon = "di:immich"

[[services]]
id = "grafana"
title = "Grafana"
url = "http://zeus:3000"
icon = "di:grafana"

[[bookmarks]]
title = "Main"

[[bookmarks.links]]
title = "ProtonMail"
url = "https://mail.proton.me"
icon = "si:protonmail"

[[bookmarks.links]]
title = "GitHub"
url = "https://github.com"
icon = "si:github"

[[bookmarks.links]]
title = "Reddit"
url = "https://reddit.com"
icon = "si:reddit"

[[bookmarks.links]]
title = "Yomu"
url = "http://zeus:4700"
# Launches the native app inside the Android shell when installed;
# opens the URL everywhere else.
android_package = "xyz.tdbm.yomu"

[[bookmarks.links]]
title = "Home Assistant"
url = "http://zeus:8093"
icon = "si:homeassistant"

# ---- layout (optional) ----
# Without [[columns]] the dashboard is a single column: search bar, services,
# bookmarks. With columns you place widgets explicitly; search/bookmarks
# widgets fall back to the top-level `search_url` / `[[bookmarks]]` above.
#
# Widget types: search, services, bookmarks, weather, feed, hacker_news,
# lobsters, releases, server_stats, calendar, systemd. Data widgets are
# fetched and cached server-side.

[[columns]]
size = "full"

[[columns.widgets]]
type = "search"

[[columns.widgets]]
type = "services"

# Hacker News front page (live "trending" ranking via the official API)
# with points and comment counts; the source label links to the discussion.
[[columns.widgets]]
type = "hacker_news"
limit = 10

[[columns.widgets]]
type = "lobsters"
limit = 10

[[columns.widgets]]
type = "bookmarks"

[[columns]]
size = "small"

# The location is geocoded and fetched directly by each client via
# Open-Meteo — the server does not fetch weather. This entry only tells
# clients which place to show and reserves the widget's dashboard slot.
[[columns.widgets]]
type = "weather"
location = "Paris"

[[columns.widgets]]
type = "calendar"

# Systemd services manager: shows unit state and offers start/stop/restart.
# Only units listed here can ever be touched; the server user needs polkit
# rights for them (services.chaos.systemdControl on NixOS, see
# docs/deployment.md).
# [[columns.widgets]]
# type = "systemd"
# title = "Machines"
# units = [
#   { unit = "stirling-pdf.service", title = "Stirling PDF" },
#   { unit = "sunshine.service", title = "Remote desktop" },
#   { unit = "sshd.service", title = "SSH", controllable = false },
# ]

[[columns.widgets]]
type = "releases"
repos = ["leptos-rs/leptos", "tauri-apps/tauri", "Y2Z/monolith"]
limit = 6

[[columns.widgets]]
type = "server_stats"
# mounts = ["/", "/data"]   # limit the disk list; empty shows every filesystem

# Home Assistant integration (Home tab: temperature history + light
# control). Omit the whole section (or leave base_url unset) to disable it.
# [home_assistant]
# base_url = "http://zeus:8093"
# token_file = "/run/agenix/chaos-ha-token"
#
# [[home_assistant.sensors]]
# id = "salon"
# label = "Salon"
# entity_id = "sensor.salon_temp_hmd_sensor_temperature"
# Each sensor may set battery_entity_id; otherwise chaos derives it from
# entity_id (..._temperature -> ..._battery) and shows a battery level
# on the Home tab when the entity exists.
# battery_entity_id = "sensor.salon_temp_hmd_sensor_battery"
#
# [[home_assistant.lights]]
# id = "lamp"
# label = "Lamp"
# entity_id = "light.lamp"

# Push notifications via ntfy (https://ntfy.sh or self-hosted). Omit the
# whole section to disable. Service alerts fire on down/recovered
# transitions (debounced over 2 checks); calendar reminders ping shortly
# before events start (local calendars + ICS feeds, all users, one topic).
# [notifications]
# ntfy_url = "https://ntfy.sh"
# topic = "chaos-zeus"
# token = "tk_..."              # only for protected topics
# service_alerts = true
# calendar_reminders = true
# reminder_lead_minutes = 15
