# Example chaos server configuration.
# Copy to chaos.toml (or point CHAOS_CONFIG at it) and adjust.
# On NixOS this file is generated by the services.chaos module.

listen = "0.0.0.0:4600"
# static_dir = "/var/lib/chaos/www"

[monitor]
interval_secs = 60
timeout_ms = 5000

[archive]
enabled = true
auto = true            # snapshot new links automatically
dir = "archives"
monolith_bin = "monolith"
timeout_secs = 120

[[services]]
id = "jellyfin"
title = "Jellyfin"
url = "http://zeus:8096"
icon = "di:jellyfin"

[[services]]
id = "immich"
title = "Immich"
url = "http://zeus:2283"
icon = "di:immich"

[[services]]
id = "grafana"
title = "Grafana"
url = "http://zeus:3000"
icon = "di:grafana"
