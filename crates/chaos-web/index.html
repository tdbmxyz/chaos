<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>chaos</title>
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="copy-dir" href="vendor" />
    <link data-trunk rel="copy-dir" href="assets" />
    <!-- SVG favicon for current browsers; PNG fallback for the rest. -->
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png" />
    <link rel="manifest" href="/assets/manifest.json" />
    <!-- Self-hosted ECharts (Home tab chart); pinned, no CDN. -->
    <script src="/vendor/echarts.min.js"></script>
    <script>
      // Shared tooltip header for time-axis charts: viewer-local weekday,
      // date, and hour:minute of the hovered instant (epoch ms). The default
      // ECharts header hides the date at hour granularity.
      function chaosTooltipHeader(ms) {
        var d = new Date(ms);
        var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        var pad = function (n) { return (n < 10 ? "0" : "") + n; };
        return days[d.getDay()] + " " + d.getDate() + " " + months[d.getMonth()]
          + ", " + pad(d.getHours()) + ":" + pad(d.getMinutes());
      }
      // Axis-tooltip formatter for time-axis charts: full day + time header,
      // body lists each visible series with its colored marker.
      window.chaosTimeTooltip = function (params) {
        if (!Array.isArray(params) || params.length === 0) return "";
        var header = chaosTooltipHeader(params[0].axisValue);
        var lines = params
          .filter(function (p) { return p.value != null && p.value[1] != null; })
          .map(function (p) {
            return p.marker + " " + p.seriesName + "  <b>" + p.value[1] + "</b>";
          });
        return "<div>" + header + "</div>" + lines.join("<br/>");
      };
      // Weather charts: header = viewer-local weekday/date/hour of the hovered
      // instant; one line per place with its weather emoji. value = [ts, temp, emoji].
      window.chaosWeatherTooltip = function (params) {
        if (!Array.isArray(params) || params.length === 0) return "";
        // axisValue (not value[0]): always present even when the first
        // param's value is null, and the same viewer-local ms on a time axis.
        var header = chaosTooltipHeader(params[0].axisValue);
        var lines = params
          .filter(function (p) { return p.value != null && p.value[1] != null; })
          .map(function (p) {
            var emoji = p.value[2] ? p.value[2] + " " : "";
            return p.marker + " " + p.seriesName + "  " + emoji + "<b>" + p.value[1] + "°</b>";
          });
        return "<div>" + header + "</div>" + lines.join("<br/>");
      };
    </script>
  </head>
  <body></body>
</html>
