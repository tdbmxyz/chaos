# CI: format, lint, and test on every push/PR to the long-lived
# branches (Git flow: develop = integration, main = releases).
#
# Both jobs are required status checks on main, so a PR only merges
# once the workspace is clean and the deployable nix packages build —
# the same artifacts a `nixos-rebuild` on the server consumes.
name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      # Persist the Nix store across runs: without this every job
      # re-downloads the whole dev-shell closure from cache.nixos.org —
      # several minutes before any step runs.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-check-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-check-${{ runner.os }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-check-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Persist cargo deps + build artifacts so clippy/test only
      # recompile the crates that actually changed.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'flake.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # fmt + clippy (native and wasm targets), same as local `just check`
      - name: just check
        run: nix develop -c just check

      # nextest runs test binaries in parallel — the chaos-server suite has
      # multi-second timeout tests that otherwise serialize (~4s → ~2s).
      - name: cargo nextest
        run: nix develop -c cargo nextest run --workspace

  # The packages the server deployment actually uses (the Android APK
  # and desktop bundle are built locally, not here).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      # Same store-persistence as the check job, separate key: this
      # job's closure is the package build inputs, not the dev shell.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-build-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-build-${{ runner.os }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-build-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: nix build chaos-server + chaos-web
        run: nix build .#chaos-server .#chaos-web --no-link
